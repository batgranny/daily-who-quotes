<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Who Inspirational Quotes</title>
  <meta name="description"
    content="A curated collection of inspirational quotes from across time and space, featuring both classic and modern eras of Doctor Who.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <main>
    <h1>Across Time and Space</h1>

    <div id="quote-container" class="quote-container">
      <p id="quote-text" class="quote-text"></p>

      <div class="quote-meta">
        <span id="quote-character" class="quote-character"></span>
        <span id="quote-story" class="quote-story"></span>
      </div>
    </div>

    <div class="button-container">
      <button id="new-quote-btn" class="new-quote-btn">
        Travel in Time (New Quote)
      </button>
    </div>
  </main>

  <script type="module" src="app.js"></script>
</body>

</html>
